<!-- incident-list.component.html -->

<section class="incident-list">

  @for(
    incident of incidents;
    track incident.id
  ) {

  <button
    class="incident-card"
    type="button"
    (click)="
      selectIncident.emit(
        incident
      )
    "
  >

    <div class="card-header">

      <div class="card-left">

        <span
          class="severity"
          [class.low]="
            incident.severity === 'LOW'
          "
          [class.medium]="
            incident.severity === 'MEDIUM'
          "
          [class.high]="
            incident.severity === 'HIGH'
          "
          [class.critical]="
            incident.severity ===
            'CRITICAL'
          "
        >
          {{ incident.severity }}
        </span>

        <span class="service">
          {{ incident.service }}
        </span>

      </div>

      <span class="status">

        {{ incident.status }}

      </span>

    </div>

    <h3>
      {{ incident.title }}
    </h3>

    <p class="card-id">

      {{ incident.id }}

    </p>

    <div class="card-footer">

      <span class="timestamp">

        {{
          incident.createdAt
            | date:'MMM d, y'
        }}

      </span>

      <span class="view-link">

        View incident →

      </span>

    </div>

  </button>

  }

</section>
